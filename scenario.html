<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenario — CzechMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="data.js"></script>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">
      <span class="flag">🇨🇿</span>Czech<span class="accent">Mate</span>
    </a>
    <ul class="nav-links">
      <li><a href="scenarios.html">Scenarios</a></li>
    </ul>
    <div class="nav-right">
      <a href="#" id="navPracticeBtn" class="btn btn-primary">Practice This →</a>
    </div>
  </nav>

  <div class="detail-header" id="scenarioHeader">
    <a href="scenarios.html" class="back-link">← All Scenarios</a>
  </div>

  <div class="content-body" id="scenarioContent"></div>

  <footer>
    <div class="footer-inner">
      <a href="index.html" class="logo" style="font-size:1.1rem">🇨🇿 Czech<span style="color:var(--red)">Mate</span></a>
      <div style="color:var(--t3);font-size:.82rem">Real language for real life.</div>
    </div>
  </footer>

  <style>
    .translation-toggle {
      display: inline-flex; align-items: center; gap: .3rem;
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 100px; padding: .25rem .35rem;
      margin-left: .75rem; vertical-align: middle;
    }
    .tt-btn {
      padding: .3rem .75rem; border-radius: 100px; border: none;
      font-family: var(--font-b); font-size: .75rem; font-weight: 600;
      cursor: pointer; transition: all .2s; background: transparent; color: var(--t2);
    }
    .tt-btn.active { background: var(--s3); color: var(--t1); box-shadow: 0 1px 6px rgba(0,0,0,.25); }
    .tt-btn:hover:not(.active) { color: var(--t1); }
  </style>

  <script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || 'pub';

    // Try SCENARIOS_V2 first (unified), fall back to old SCENARIOS
    let scenario = getScenarioV2(id);
    const isV2 = !!scenario;

    if (!isV2) {
      // Legacy scenario (Spanish-only es_ scenarios) — fall back gracefully
      const legacy = SCENARIOS.find(s => s.id === id);
      if (legacy) {
        window.location.href = 'scenarios.html';
        return;
      }
      document.getElementById('scenarioHeader').innerHTML = `<a href="scenarios.html" class="back-link">← All Scenarios</a><h1>Scenario not found</h1>`;
      return;
    }

    let displayLang = LangUtils.get() || 'czech';

    const FLAG = { czech: '🇨🇿', english: '🇬🇧', spanish: '🇪🇸' };
    const LABEL = { czech: 'Czech', english: 'English', spanish: 'Spanish' };

    document.getElementById('navPracticeBtn').href = `practice.html?scenario=${id}`;
    document.title = `${scenario.title[displayLang] || scenario.title.english} — Czech Mate`;

    function renderHeader() {
      const otherLang = displayLang === 'czech' ? 'spanish' : 'czech';
      document.getElementById('scenarioHeader').innerHTML = `
        <a href="scenarios.html" class="back-link">← All Scenarios</a>
        <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap">
          <div style="display:inline-flex;background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:.25rem .35rem;gap:.25rem">
            <button class="tt-btn ${displayLang==='czech'?'active':''}" onclick="switchLang('czech')">🇨🇿 Czech</button>
            <button class="tt-btn ${displayLang==='spanish'?'active':''}" onclick="switchLang('spanish')">🇪🇸 Spanish</button>
          </div>
          <span style="font-size:.78rem;color:var(--t3)">Showing ${FLAG[displayLang]} ${LABEL[displayLang]} as primary</span>
        </div>
        <h1>${scenario.icon} ${scenario.title[displayLang] || scenario.title.english}</h1>
        <div class="detail-cz">${scenario.subtitle[displayLang] || scenario.subtitle.english}</div>
        <p>${scenario.context[displayLang] || scenario.context.english}</p>
        <div class="detail-badges">
          <span class="badge difficulty ${scenario.difficulty}">${scenario.difficulty}</span>
          <span class="badge">${scenario.category}</span>
          <span class="badge">${FLAG[displayLang]} ${LABEL[displayLang]} primary</span>
          <span class="badge">${scenario.dialogue.length} lines</span>
        </div>
      `;
    }

    function renderDialogue() {
      const otherLang = displayLang === 'czech' ? 'spanish' : 'czech';
      return `
        <div class="content-block">
          <div class="content-block-title">💬 The Dialogue</div>
          <div class="dialogue-box">
            ${scenario.dialogue.map(line => {
              const primaryText = line[displayLang] || line.czech;
              const otherText = line[otherLang] || '';
              const speakerName = (line.speaker && line.speaker[displayLang]) ? line.speaker[displayLang] : (line.speaker || 'Speaker');
              const note = line.note ? (line.note[displayLang] || line.note.english || '') : '';
              return `
                <div class="dialogue-line ${line.role === 'you' ? 'you-line' : ''}">
                  <div class="dl-speaker">${line.role === 'you' ? 'You' : speakerName}</div>
                  <div>
                    <div class="dl-czech">${primaryText}</div>
                    <div class="dl-english">🇬🇧 ${line.english}</div>
                    ${otherText ? `<div class="dl-english" style="color:var(--t3);font-size:.82rem">${FLAG[otherLang]} ${otherText}</div>` : ''}
                    ${note ? `<div class="dl-note">💡 ${note}</div>` : ''}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function speakPhrase(text, lang) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = lang === 'spanish' ? 'es-ES' : 'cs-CZ';
      utter.rate = 0.85;
      window.speechSynthesis.speak(utter);
    }

    function renderKeyPhrases() {
      const otherLang = displayLang === 'czech' ? 'spanish' : 'czech';
      return `
        <div class="content-block">
          <div class="content-block-title">🔑 Key Phrases</div>
          <div class="phrases-list">
            ${scenario.keyPhrases.map(p => {
              const primaryText = p[displayLang] || p.czech;
              const otherText = p[otherLang] || '';
              const pronunciation = p.pronunciation ? (p.pronunciation[displayLang] || '') : '';
              return `
                <div class="phrase-row" style="grid-template-columns:1.4fr 1fr 1fr">
                  <div class="p-cz">${primaryText}${otherText ? `<div style="font-size:.76rem;color:var(--t3);margin-top:.2rem">${FLAG[otherLang]} ${otherText}</div>` : ''}</div>
                  <div class="p-en">🇬🇧 ${p.english}</div>
                  <div class="p-ph">
                    ${pronunciation ? `🔊 ${pronunciation}` : ''}
                    <button onclick="speakPhrase('${primaryText.replace(/'/g,"\\'")}','${displayLang}')" style="display:inline-flex;align-items:center;gap:.2rem;margin-top:.3rem;padding:.2rem .5rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:.68rem;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--t3)'">🔊 Listen</button>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderCulturalTips() {
      const tips = scenario.culturalTips[displayLang] || scenario.culturalTips.czech || [];
      const flagLabel = FLAG[displayLang];
      return `
        <div class="content-block">
          <div class="content-block-title">${flagLabel} Cultural Tips</div>
          <div class="tips-list">
            ${tips.map(t => `
              <div class="tip">
                <h4>${t.title}</h4>
                <p>${t.body}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderRealVsTextbook() {
      const rvt = scenario.realVsTextbook[displayLang] || scenario.realVsTextbook.czech || [];
      return `
        <div class="content-block">
          <div class="content-block-title">⚡ Real vs. Textbook</div>
          <div class="rvt-grid">
            <div class="rvt-col textbook">
              <h4>📖 Textbook says...</h4>
              ${rvt.map(r => `<div class="rvt-item">${r.textbook}</div>`).join('')}
            </div>
            <div class="rvt-col real">
              <h4>✅ Locals actually say...</h4>
              ${rvt.map(r => `<div class="rvt-item">${r.real}</div>`).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderPracticeCTA() {
      return `
        <div class="practice-cta-box">
          <h3>Ready to practice?</h3>
          <p>Chat with a simulated character. Get gentle corrections. Build confidence before the real thing.</p>
          <a href="practice.html?scenario=${id}" class="btn btn-primary btn-lg">Start AI Practice →</a>
        </div>
      `;
    }

    function renderAll() {
      renderHeader();
      document.getElementById('scenarioContent').innerHTML =
        renderDialogue() + renderKeyPhrases() + renderCulturalTips() + renderRealVsTextbook() + renderPracticeCTA();
    }

    window.switchLang = function(lang) {
      displayLang = lang;
      LangUtils.set(lang);
      renderAll();
    };

    renderAll();
  })();
  </script>
</body>
</html>
