<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice — CzechMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="data.js"></script>
  <script src="chat.js"></script>
  <style>
    .quick-btns { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.65rem; }
    .quick-btn { padding:.38rem .8rem; border-radius:var(--r); border:1px solid var(--border); background:var(--s2); color:var(--t2); font-size:.78rem; font-weight:500; cursor:pointer; transition:all .15s; }
    .quick-btn:hover { border-color:var(--border-l); color:var(--t1); }
    .voice-quick-btn { border-color:rgba(230,57,70,.4); color:var(--red); }
    .voice-quick-btn:hover { border-color:var(--red); background:rgba(230,57,70,.08); }
    .voice-quick-btn.listening { background:rgba(230,57,70,.12); color:var(--red); animation: pulse 1s infinite; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">
      <span class="flag">🇨🇿</span>Czech<span class="accent">Mate</span>
    </a>
    <ul class="nav-links">
      <li><a href="scenarios.html">Scenarios</a></li>
      <li id="navScenarioLink"></li>
    </ul>
    <div class="nav-right">
      <a href="scenarios.html" class="btn btn-ghost" style="font-size:.85rem">Switch Scenario</a>
    </div>
  </nav>

  <div class="chat-layout">

    <!-- SIDEBAR -->
    <div class="chat-sidebar" id="chatSidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Scenario Context</div>
        <div class="context-card" id="sidebarContext">Loading…</div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Useful Vocabulary</div>
        <div id="sidebarVocab"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Quick Tip</div>
        <div class="tip-card" id="sidebarTip">Loading…</div>
      </div>
      <div class="sidebar-section" style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)">
        <div class="sidebar-label">Switch Practice</div>
        <div id="scenarioSwitcher"></div>
      </div>
    </div>

    <!-- CHAT MAIN -->
    <div class="chat-main">

      <div class="chat-topbar">
        <div class="chat-persona">
          <div class="persona-avatar" id="personaAvatar">…</div>
          <div>
            <div class="persona-name" id="personaName">Loading…</div>
            <div class="persona-role" id="personaRole">—</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:1rem">
          <div class="persona-status"><span class="status-dot"></span> Online</div>
          <span id="langBadge" style="font-size:.75rem;font-weight:700;padding:.25rem .65rem;border-radius:100px;background:var(--s3);color:var(--t2);border:1px solid var(--border)"></span>
        </div>
      </div>

      <div class="chat-msgs" id="chatMsgs">
        <div id="welcomeState" style="flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 2rem;">
          <div style="text-align:center;max-width:400px">
            <div style="font-size:3.5rem;margin-bottom:1rem" id="welcomeIcon">…</div>
            <h3 style="font-family:var(--font-h);font-size:1.4rem;font-weight:700;margin-bottom:.75rem" id="welcomeTitle">Ready to practice?</h3>
            <p style="color:var(--t2);font-size:.92rem;line-height:1.7;margin-bottom:1.5rem" id="welcomeSub">Loading…</p>
            <div id="welcomeActions"></div>
          </div>
        </div>
      </div>

      <div class="chat-input-area" id="chatInputArea" style="display:none">
        <div class="quick-btns" id="quickBtns">
          <button class="quick-btn" onclick="handleQuickHint('dont_understand')">🤷 I don't understand</button>
          <button class="quick-btn" onclick="handleQuickHint('repeat')">🔁 Repeat please</button>
          <button class="quick-btn" onclick="handleQuickHint('slower')">🐢 Speak slower</button>
          <button class="quick-btn" id="impressBtn" onclick="activateImpressMode()" style="border-color:rgba(244,162,97,.4);color:var(--gold)">😏 Impress mode</button>
          <button class="quick-btn voice-quick-btn" id="voiceBtn" onclick="startVoice()">🎤 Try speaking</button>
        </div>
        <form class="chat-form" id="chatForm" onsubmit="handleSubmit(event)">
          <input
            type="text"
            class="chat-input"
            id="chatInput"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
          <button type="submit" class="chat-submit" title="Send">➤</button>
        </form>
        <div class="chat-hint" id="chatHint"></div>
      </div>

    </div>
  </div>

  <script>
  (function () {
    // ── SETUP ─────────────────────────────────────────────
    const params      = new URLSearchParams(window.location.search);
    let scenarioId    = params.get('scenario') || 'pub';
    const userLang    = LangUtils.get() || 'czech';
    const dateCoach   = params.get('mode') === 'date_coach';
    const autoPlayAlong = params.get('playalong') === '1';

    // V2→Chat mapping: unified V2 IDs map to language-specific chat IDs
    const V2_CHAT_MAP = {
      pub:       { czech: 'pub',       spanish: 'es_tapas' },
      inlaws:    { czech: 'parents',   spanish: 'es_family' },
      padel:     { czech: 'padel',     spanish: 'es_padel' },
      flat:      { czech: 'flat',      spanish: 'es_flat' },
      doctor:    { czech: 'doctor',    spanish: 'es_doctor' },
      interview: { czech: 'interview', spanish: 'es_interview' },
      office:    { czech: 'office',    spanish: 'es_office' },
      police:    { czech: 'police',    spanish: 'es_nie' },
      date:      { czech: 'date',      spanish: 'es_date' },
      grocery:   { czech: 'grocery',   spanish: 'es_grocery' }
    };

    // Resolve V2 scenario to chat engine ID based on user's language
    const v2Scenario  = (typeof getScenarioV2 === 'function') ? getScenarioV2(scenarioId) : null;
    const chatId      = V2_CHAT_MAP[scenarioId]?.[userLang] || scenarioId;
    const scenarioMeta = SCENARIOS.find(s => s.id === chatId) || SCENARIOS.find(s => s.id === scenarioId) || SCENARIOS[0];
    const lang        = scenarioMeta.language || userLang;
    const hasChat     = ChatEngine.hasChatSupport(chatId);

    // Use resolved chatId for the engine
    scenarioId = chatId;

    const LANG_INFO = {
      czech:   { flag: '🇨🇿', label: 'Czech',         placeholder: 'Type in Czech… accents optional 😊',   hint: 'Accents optional — "jedno pivo" and "jedno pivo" both work. Focus on the words.' },
      spanish: { flag: '🇪🇸', label: 'Spain Spanish',  placeholder: 'Type in Spanish… ¡sin presión! 😄',   hint: 'Spain Spanish dialect — phrases like "ponme" and "caña" are Spain-specific. Accents optional.' }
    };
    const li = LANG_INFO[lang] || LANG_INFO[userLang] || LANG_INFO.czech;

    // Derive display info from V2 scenario if available, fallback to old SCENARIOS
    const displayTitle = v2Scenario ? (v2Scenario.title[userLang] || v2Scenario.title.english) : scenarioMeta.title;
    const displayIcon  = v2Scenario ? v2Scenario.icon : scenarioMeta.icon;
    const origId       = params.get('scenario') || 'pub';

    // Nav
    document.getElementById('navScenarioLink').innerHTML =
      `<a href="scenario.html?id=${origId}" style="color:var(--gold)">${displayIcon} ${displayTitle}</a>`;
    document.title = `Practice: ${displayTitle} — CzechMate`;

    // Language badge
    document.getElementById('langBadge').textContent = `${li.flag} ${li.label}`;

    // Scenario switcher — show V2 scenarios (unified, both languages)
    const switcherScenarios = (typeof SCENARIOS_V2 !== 'undefined') ? SCENARIOS_V2 : [];
    document.getElementById('scenarioSwitcher').innerHTML = switcherScenarios.map(s => {
      const sTitle = s.title[userLang] || s.title.english;
      const active = s.id === origId;
      return `<a href="practice.html?scenario=${s.id}" class="btn btn-ghost"
                 style="font-size:.8rem;padding:.45rem .9rem;margin-bottom:.3rem;
                        ${active ? 'border-color:var(--red);color:var(--red)' : ''}">
                ${s.icon} ${sTitle}${active ? ' ✓' : ''}
              </a>`;
    }).join('');

    // ── NO CHAT SUPPORT — show "coming soon" state ────────
    if (!hasChat) {
      const fallbackId = userLang === 'spanish' ? 'pub' : 'pub'; // V2 id
      const fallbackV2 = (typeof getScenarioV2 === 'function') ? getScenarioV2(fallbackId) : null;
      const fallbackTitle = fallbackV2 ? (fallbackV2.title[userLang] || fallbackV2.title.english) : 'At the Pub';
      const fallbackIcon = fallbackV2 ? fallbackV2.icon : '🍺';

      document.getElementById('personaAvatar').textContent = displayIcon;
      document.getElementById('personaName').textContent = displayTitle;
      document.getElementById('personaRole').textContent = 'Practice coming soon';
      document.getElementById('sidebarContext').textContent = v2Scenario ? (v2Scenario.shortDesc[userLang] || v2Scenario.shortDesc.english) : scenarioMeta.shortDesc;
      document.getElementById('sidebarTip').textContent = 'Review the scenario page for dialogue, key phrases, and cultural tips.';
      document.getElementById('sidebarVocab').innerHTML = '';

      document.getElementById('welcomeIcon').textContent = displayIcon;
      document.getElementById('welcomeTitle').textContent = `${displayTitle} — Practice`;
      document.getElementById('welcomeSub').textContent = 'Full AI chat for this scenario is coming soon. In the meantime, review the scenario and try the available practice modes below.';
      document.getElementById('welcomeActions').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:.75rem;align-items:center">
          <a href="scenario.html?id=${origId}" class="btn btn-primary btn-lg">Review Scenario →</a>
          <a href="practice.html?scenario=${fallbackId}" class="btn btn-ghost">
            Try ${fallbackIcon} ${fallbackTitle} instead
          </a>
          <div style="font-size:.78rem;color:var(--t3);margin-top:.5rem">Full AI chat coming soon for this scenario</div>
        </div>
      `;
      return; // stop here — no chat to init
    }

    // ── INIT CHAT ─────────────────────────────────────────
    const chatData = ChatEngine.init(scenarioId);
    let chatStarted = false;
    let msgCount = 0;

    // ── SAVE / RESTORE (localStorage) ─────────────────────
    const SAVE_KEY = `czechmate_chat_v1_${scenarioId}`;
    let sessionMessages = []; // mirror of rendered messages for saving

    function saveSession() {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
          scenarioId,
          messages:    sessionMessages,
          engineState: ChatEngine.getState(),
          timestamp:   Date.now()
        }));
      } catch(e) { /* storage full or unavailable — fail silently */ }
    }

    function loadSession() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        // Expire sessions older than 7 days
        if (Date.now() - data.timestamp > 7 * 24 * 60 * 60 * 1000) {
          localStorage.removeItem(SAVE_KEY);
          return null;
        }
        return data;
      } catch(e) { return null; }
    }

    function clearSession() {
      localStorage.removeItem(SAVE_KEY);
      sessionMessages = [];
    }

    function timeAgo(ts) {
      const mins = Math.round((Date.now() - ts) / 60000);
      if (mins < 1)  return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.round(mins / 60);
      if (hrs < 24)  return `${hrs}h ago`;
      return `${Math.round(hrs / 24)}d ago`;
    }

    const savedSession = loadSession();

    // Persona
    document.getElementById('personaAvatar').textContent = chatData.persona.avatar;
    document.getElementById('personaName').textContent   = chatData.persona.name;
    document.getElementById('personaRole').textContent   = chatData.persona.role;

    // Sidebar
    document.getElementById('sidebarContext').textContent = chatData.context;
    document.getElementById('sidebarTip').textContent     = chatData.tip;
    document.getElementById('sidebarVocab').innerHTML     = chatData.vocabulary.map(v => `
      <div class="vocab-item">
        <span class="vocab-cz">${v.cz}</span>
        <span class="vocab-en">${v.en}</span>
      </div>
    `).join('');

    // Sidebar — clear saved session link (shown only if session exists)
    if (savedSession) {
      const clearBtn = document.createElement('div');
      clearBtn.style.cssText = 'margin-top:.75rem;text-align:center';
      clearBtn.innerHTML = `<button onclick="window.clearAndReload()" style="background:none;border:none;color:var(--t3);font-size:.75rem;cursor:pointer;text-decoration:underline">🗑 Clear saved conversation</button>`;
      document.getElementById('chatSidebar').appendChild(clearBtn);
    }

    window.clearAndReload = function() {
      clearSession();
      location.reload();
    };

    // Input placeholder + hint
    document.getElementById('chatInput').placeholder = li.placeholder;
    document.getElementById('chatHint').textContent  = li.hint;

    // Welcome state — show resume option if a session is saved
    document.getElementById('welcomeIcon').textContent  = scenarioMeta.icon;
    document.getElementById('welcomeTitle').textContent = `Practice: ${scenarioMeta.title}`;
    document.getElementById('welcomeSub').textContent   = chatData.context;

    // ── DATE COACHING WELCOME (when ?mode=date_coach) ─────
    if (dateCoach) {
      document.getElementById('welcomeIcon').textContent = '💘';
      document.getElementById('welcomeTitle').textContent = 'Date Night Prep 😏';
      document.getElementById('welcomeSub').textContent = 'Quick prep before the real thing. Answer two questions and I\'ll give you the exact phrases you need.';
      document.getElementById('welcomeActions').innerHTML = `
        <div id="dateCoachForm" style="text-align:left;max-width:340px;margin:0 auto">
          <div style="margin-bottom:1rem">
            <div style="font-size:.82rem;font-weight:700;color:var(--t2);margin-bottom:.5rem">First date?</div>
            <div style="display:flex;gap:.5rem;flex-wrap:wrap">
              <button class="btn btn-ghost" id="dc_first_yes" onclick="dcSelect('first','yes',this)" style="font-size:.82rem;padding:.4rem .9rem">Yes 😬</button>
              <button class="btn btn-ghost" id="dc_first_no" onclick="dcSelect('first','no',this)" style="font-size:.82rem;padding:.4rem .9rem">No, we know each other</button>
            </div>
          </div>
          <div style="margin-bottom:1.25rem">
            <div style="font-size:.82rem;font-weight:700;color:var(--t2);margin-bottom:.5rem">Where are you going?</div>
            <div style="display:flex;gap:.5rem;flex-wrap:wrap">
              <button class="btn btn-ghost" id="dc_where_bar" onclick="dcSelect('where','bar',this)" style="font-size:.82rem;padding:.4rem .9rem">🍺 Bar</button>
              <button class="btn btn-ghost" id="dc_where_restaurant" onclick="dcSelect('where','restaurant',this)" style="font-size:.82rem;padding:.4rem .9rem">🍽️ Restaurant</button>
              <button class="btn btn-ghost" id="dc_where_walk" onclick="dcSelect('where','walk',this)" style="font-size:.82rem;padding:.4rem .9rem">🚶 Walk</button>
            </div>
          </div>
          <button class="btn btn-primary btn-lg" onclick="showDatePhrases()" id="dcShowBtn" style="width:100%">Show me what to say →</button>
        </div>
        <div id="datePhraseCards" style="display:none;text-align:left;max-width:380px;margin:0 auto"></div>
      `;
    } else if (savedSession && savedSession.messages && savedSession.messages.length > 0) {
      document.getElementById('welcomeActions').innerHTML = `
        <button class="btn btn-primary btn-lg" onclick="window.resumeChat()" style="margin-bottom:.5rem">
          ▶ Resume Conversation
        </button>
        <div style="font-size:.78rem;color:var(--t3);margin-bottom:1rem">
          Saved ${timeAgo(savedSession.timestamp)} · ${savedSession.messages.filter(m=>m.role==='user').length} messages sent
        </div>
        <button class="btn btn-ghost" onclick="window.startFresh()" style="font-size:.85rem">
          Start Fresh
        </button>
      `;
    } else {
      document.getElementById('welcomeActions').innerHTML = `
        <button class="btn btn-primary btn-lg" onclick="window.startChat()">Start Conversation →</button>
        <div style="margin-top:.75rem;font-size:.78rem;color:var(--t3)">
          ${li.flag} Type in ${li.label} — accents are optional, just focus on the words.
        </div>
      `;
    }

    // ── Date coach state & helpers ─────────────────────
    const dcState = { first: null, where: null };
    window.dcSelect = function(key, val, btn) {
      dcState[key] = val;
      // Highlight selected button
      const group = btn.parentElement.querySelectorAll('button');
      group.forEach(b => b.style.borderColor = '');
      btn.style.borderColor = 'var(--red)';
      btn.style.color = 'var(--t1)';
    };

    window.showDatePhrases = function() {
      const DATE_PHRASES = {
        bar: [
          { label: 'Ordering drinks', cz: 'Jedno pivo a jedno víno, prosím', en: 'One beer and one wine, please' },
          { label: 'Compliment', cz: 'Vypadáš dnes skvěle', en: 'You look great today' },
          { label: 'Small talk', cz: 'Líbí se mi tady', en: 'I like it here' },
          { label: 'Light flirt', cz: 'Rád/a trávím čas s tebou', en: 'I enjoy spending time with you' },
          { label: 'Ask a question', cz: 'Odkud jsi původem?', en: 'Where are you originally from?' }
        ],
        restaurant: [
          { label: 'Ordering', cz: 'Dám si to samé co ona, prosím', en: 'I\'ll have the same as her, please' },
          { label: 'Compliment food', cz: 'Bylo to výborné!', en: 'That was excellent!' },
          { label: 'Compliment her', cz: 'Vypadáš dnes nádherně', en: 'You look beautiful today' },
          { label: 'Ask question', cz: 'Jaké je tvoje oblíbené místo v Praze?', en: 'What\'s your favourite place in Prague?' },
          { label: 'Pay the bill', cz: 'Zaplatím, prosím — za nás oba', en: 'I\'ll pay, please — for both of us' }
        ],
        walk: [
          { label: 'Start', cz: 'Kam tě mám vzít?', en: 'Where should I take you?' },
          { label: 'Compliment', cz: 'Vypadáš skvěle dnes', en: 'You look great today' },
          { label: 'Small talk', cz: 'Líbí se mi Praha večer', en: 'I love Prague in the evening' },
          { label: 'Light flirt', cz: 'Jsi zajímavá', en: 'You\'re interesting' },
          { label: 'Suggest stop', cz: 'Chceš si někde sednout?', en: 'Do you want to sit somewhere?' }
        ]
      };

      const firstLine = dcState.first === 'yes'
        ? '💡 First date tip: keep it light, ask questions, don\'t talk only about yourself.'
        : '💡 Good — you already have a connection. Use it. Reference something you both know.';
      const where = dcState.where || 'bar';
      const phrases = DATE_PHRASES[where] || DATE_PHRASES.bar;

      const cards = document.getElementById('datePhraseCards');
      cards.style.display = 'block';
      document.getElementById('dateCoachForm').style.display = 'none';
      cards.innerHTML = `
        <div style="font-size:.8rem;color:var(--gold);font-weight:600;margin-bottom:1rem;padding:.6rem .8rem;background:rgba(244,162,97,.08);border-radius:var(--r);border:1px solid rgba(244,162,97,.2)">${firstLine}</div>
        <div style="font-size:.82rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem">Phrases for tonight</div>
        ${phrases.map(p => `
          <div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.7rem .9rem;margin-bottom:.5rem">
            <div style="font-size:.7rem;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:.2rem">${p.label}</div>
            <div style="font-size:.95rem;font-weight:700;color:var(--t1)">${esc(p.cz)}</div>
            <div style="font-size:.78rem;color:var(--t2)">${esc(p.en)}</div>
          </div>`).join('')}
        <div style="background:rgba(6,214,160,.06);border:1px solid rgba(6,214,160,.2);border-radius:var(--r);padding:.7rem .9rem;margin-top:.75rem;font-size:.82rem;color:var(--green);font-weight:600">
          You're doing better than you think 😄 — she'll respect the effort.
        </div>
        <button class="btn btn-primary btn-lg" onclick="window.startChat()" style="width:100%;margin-top:1rem">
          Practice the conversation now →
        </button>
      `;
    };

    // ── START (fresh) ─────────────────────────────────────
    window.startChat = function startChat() {
      clearSession();
      chatStarted = true;
      document.getElementById('welcomeState').remove();
      document.getElementById('chatInputArea').style.display = 'block';
      const opening = chatData.opening;
      sessionMessages.push({ role: 'ai', text: opening.text, translation: opening.translation });
      saveSession();
      addAIMessage(opening.text, opening.translation, false);
      document.getElementById('chatInput').focus();
    };

    // ── START FRESH (from welcome resume screen) ──────────
    window.startFresh = function startFresh() {
      clearSession();
      // Rebuild welcome with the normal start button
      document.getElementById('welcomeActions').innerHTML = `
        <button class="btn btn-primary btn-lg" onclick="window.startChat()">Start Conversation →</button>
        <div style="margin-top:.75rem;font-size:.78rem;color:var(--t3)">
          ${li.flag} Type in ${li.label} — accents are optional, just focus on the words.
        </div>
      `;
      document.getElementById('welcomeTitle').textContent = `Practice: ${scenarioMeta.title}`;
    };

    // ── RESUME saved session ───────────────────────────────
    window.resumeChat = function resumeChat() {
      if (!savedSession) { window.startChat(); return; }
      chatStarted = true;
      document.getElementById('welcomeState').remove();
      document.getElementById('chatInputArea').style.display = 'block';

      // Re-init engine for this scenario, then restore saved position
      ChatEngine.init(scenarioId);
      ChatEngine.restoreState(savedSession.engineState);
      sessionMessages = savedSession.messages;
      msgCount = savedSession.engineState.messageCount || 0;

      // Render a "resumed" divider first
      const msgs = document.getElementById('chatMsgs');
      const divider = document.createElement('div');
      divider.innerHTML = `
        <div style="text-align:center;font-size:.73rem;color:var(--t3);
                    padding:.4rem;border-top:1px solid var(--border);
                    border-bottom:1px solid var(--border);margin:.5rem 0">
          ↩ Conversation resumed from ${timeAgo(savedSession.timestamp)}
        </div>`;
      msgs.appendChild(divider);

      // Replay all saved messages instantly (no delay)
      savedSession.messages.forEach(m => {
        if      (m.role === 'ai')           renderAI(m.text, m.translation);
        else if (m.role === 'user')         renderUserMsg(m.text);
        else if (m.role === 'correction')   renderCorrection(m);
        else if (m.role === 'encouragement') renderEncouragement(m.text);
      });

      scrollBottom();
      document.getElementById('chatInput').focus();
    };

    // ── RENDER HELPERS ─────────────────────────────────────
    function addAIMessage(text, translation, withDelay = true) {
      const msgs = document.getElementById('chatMsgs');
      if (withDelay) {
        const tid = 'typing_' + Date.now();
        const el  = document.createElement('div');
        el.id = tid;
        el.innerHTML = `<div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
        msgs.appendChild(el);
        scrollBottom();
        const delay = 500 + Math.random() * 700;
        setTimeout(() => { el.remove(); renderAI(text, translation); }, delay);
      } else {
        renderAI(text, translation);
      }
    }

    function renderAI(text, translation) {
      const msgs = document.getElementById('chatMsgs');
      const el   = document.createElement('div');
      el.className = 'msg ai';
      const escapedText = esc(text);
      el.innerHTML = `
        <div class="msg-bubble">${escapedText}</div>
        ${translation ? `<div class="msg-meta">${esc(translation)}</div>` : ''}
        <button class="msg-audio-btn" onclick="ChatEngine.speak('${text.replace(/'/g,"\\'")}', ChatEngine.getLanguage())">🔊 Listen</button>
      `;
      msgs.appendChild(el);
      scrollBottom();
    }

    function addUserMessage(text) {
      renderUserMsg(text);
    }

    function renderUserMsg(text) {
      const msgs = document.getElementById('chatMsgs');
      const el   = document.createElement('div');
      el.className = 'msg user';
      el.innerHTML = `<div class="msg-bubble">${esc(text)}</div>`;
      msgs.appendChild(el);
      scrollBottom();
    }

    function addCorrection(c) {
      renderCorrection(c);
    }

    function renderCorrection(c) {
      const msgs = document.getElementById('chatMsgs');
      const el   = document.createElement('div');
      el.className = 'msg ai';
      el.innerHTML = `
        <div class="msg-correction">
          <div class="correction-label">⚠️ Quick correction</div>
          <strong>"${esc(c.wrong)}"</strong> → <strong style="color:var(--green)">"${esc(c.right)}"</strong>
          <div style="margin-top:.35rem;color:var(--t2)">${esc(c.explain)}</div>
        </div>`;
      msgs.appendChild(el);
      scrollBottom();
    }

    function addEncouragement(text) {
      renderEncouragement(text);
    }

    function renderEncouragement(text) {
      const msgs = document.getElementById('chatMsgs');
      const el   = document.createElement('div');
      el.innerHTML = `
        <div style="text-align:center;font-size:.78rem;color:var(--green);
                    padding:.5rem;border-top:1px solid var(--border);
                    border-bottom:1px solid var(--border);margin:.5rem 0">
          ✓ ${esc(text)}
        </div>`;
      msgs.appendChild(el);
      scrollBottom();
    }

    // Scenario-specific "try this today" hooks
    const RETENTION_HOOKS = {
      pub:       { icon: '🍺', text: 'Order a beer in Czech tonight — just say "Jedno pivo, prosím"' },
      parents:   { icon: '😊', text: 'Say "Výborné!" the next time you try Czech food' },
      date:      { icon: '😏', text: 'Use "Vypadáš skvěle" on your date tonight' },
      padel:     { icon: '🎾', text: 'Greet your next padel partner in Czech' },
      flat:      { icon: '🏠', text: 'Ask your landlord one thing in Czech this week' },
      doctor:    { icon: '🩺', text: 'Try saying "Bolí mě hlava" if you ever need a doctor' },
      interview: { icon: '💼', text: 'Introduce yourself in Czech at your next meeting' },
      office:    { icon: '☕', text: 'Say "Dobrý den" to a Czech colleague tomorrow' },
      police:    { icon: '📋', text: 'Practice your address in Czech — you may need it' },
      grocery:   { icon: '🛒', text: 'Buy something at a Czech shop without pointing' },
      es_tapas:  { icon: '🍺', text: 'Order a caña in Spanish tonight — "Ponme una caña, por favor"' },
      es_family: { icon: '😊', text: 'Greet someone\'s family in Spanish this week' },
      es_date:   { icon: '😏', text: 'Compliment someone in Spanish — "Estás muy guapo/a"' }
    };

    function showCompletionBanner() {
      clearSession(); // conversation done — no need to keep the save
      const hook = RETENTION_HOOKS[scenarioId] || RETENTION_HOOKS[origId] || { icon: '🎯', text: 'Use one phrase from today in real life.' };
      const msgs = document.getElementById('chatMsgs');
      const el   = document.createElement('div');
      el.innerHTML = `
        <div style="background:linear-gradient(135deg,rgba(6,214,160,.08),rgba(230,57,70,.08));
                    border:1px solid var(--border-l);border-radius:var(--r-lg);
                    padding:1.75rem;text-align:center;margin:1rem 0">
          <div style="font-size:2.5rem;margin-bottom:.75rem">🎉</div>
          <h3 style="font-family:var(--font-h);font-size:1.2rem;font-weight:700;margin-bottom:.5rem">
            Scenario Complete!
          </h3>
          <p style="color:var(--t2);font-size:.88rem;margin-bottom:1rem">
            You held a full conversation in ${li.label}. That's the real thing.
          </p>
          <div style="background:rgba(244,162,97,.08);border:1px solid rgba(244,162,97,.25);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:1.25rem">
            <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gold);margin-bottom:.3rem">Try this in real life today</div>
            <div style="font-size:1.1rem;margin-bottom:.2rem">${hook.icon}</div>
            <div style="font-size:.88rem;color:var(--t1);font-weight:500">${hook.text}</div>
          </div>
          <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
            <a href="scenario.html?id=${origId}" class="btn btn-ghost" style="font-size:.85rem">Review Scenario</a>
            <a href="scenarios.html" class="btn btn-primary" style="font-size:.85rem">Try Another →</a>
          </div>
        </div>`;
      msgs.appendChild(el);
      scrollBottom();
      const area = document.getElementById('chatInputArea');
      area.style.opacity = '0.4';
      area.style.pointerEvents = 'none';
    }

    // ── LIVE SUPPORT (date mode) ───────────────────────────
    const LIVE_SUPPORT_PATTERNS = [
      /don'?t understand/i, /she said/i, /something fast/i,
      /what did.*say/i, /nerozumim/i, /co rekla/i, /mluvila rychle/i,
      /too fast/i, /help.*now/i
    ];
    const LIVE_SUPPORT_RESPONSES = [
      { text: 'Nerozumím — mluvte pomaleji, prosím.', en: 'I don\'t understand — please speak slower.' },
      { text: 'Promiňte, můžete to zopakovat?', en: 'Sorry, can you repeat that?' },
      { text: 'Ještě jednou, prosím. Pomaleji.', en: 'One more time, please. Slower.' }
    ];
    let liveSupportIdx = 0;

    function checkLiveSupport(text) {
      return (origId === 'date' || dateCoach) &&
             LIVE_SUPPORT_PATTERNS.some(p => p.test(text));
    }

    // ── IMPRESS MODE BUTTON ────────────────────────────────
    window.activateImpressMode = function() {
      if (!chatStarted) return;
      ChatEngine.setPlayAlong(true);
      const input = document.getElementById('chatInput');
      input.value = 'help me impress';
      document.getElementById('chatForm').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
      document.getElementById('impressBtn').textContent = '✓ Impress mode on';
      document.getElementById('impressBtn').style.borderColor = 'var(--gold)';
      document.getElementById('impressBtn').disabled = true;
    };

    // Auto-activate play along mode if ?playalong=1
    if (autoPlayAlong) {
      // Will be activated once chat starts
      const origStart = window.startChat;
      window.startChat = function() {
        origStart();
        setTimeout(() => {
          ChatEngine.setPlayAlong(true);
          const btn = document.getElementById('impressBtn');
          if (btn) { btn.textContent = '✓ Impress mode on'; btn.style.borderColor = 'var(--gold)'; btn.disabled = true; }
        }, 100);
      };
    }

    // ── SUBMIT ─────────────────────────────────────────────
    window.handleSubmit = function handleSubmit(e) {
      e.preventDefault();
      const input = document.getElementById('chatInput');
      const text  = input.value.trim();
      if (!text) return;
      input.value = '';
      msgCount++;

      sessionMessages.push({ role: 'user', text });
      addUserMessage(text);

      // Live support override for date mode
      if (checkLiveSupport(text)) {
        const resp = LIVE_SUPPORT_RESPONSES[liveSupportIdx % LIVE_SUPPORT_RESPONSES.length];
        liveSupportIdx++;
        sessionMessages.push({ role: 'ai', text: resp.text, translation: resp.en });
        addAIMessage(resp.text, resp.en, true);
        const boost = document.getElementById('chatMsgs');
        const boostEl = document.createElement('div');
        boostEl.innerHTML = `<div style="text-align:center;font-size:.78rem;color:var(--green);padding:.4rem;margin:.3rem 0">You're doing better than you think 😄</div>`;
        setTimeout(() => { boost.appendChild(boostEl); scrollBottom(); }, 1200);
        saveSession();
        return;
      }

      const result = ChatEngine.process(text);

      if (result.correction) {
        sessionMessages.push({ role: 'correction', ...result.correction });
        setTimeout(() => addCorrection(result.correction), 300);
      }

      const delay = result.correction ? 1400 : 0;
      setTimeout(() => {
        sessionMessages.push({ role: 'ai', text: result.response.text, translation: result.response.translation });
        addAIMessage(result.response.text, result.response.translation, true);

        if (result.encouragement) {
          sessionMessages.push({ role: 'encouragement', text: result.encouragement });
          setTimeout(() => addEncouragement(result.encouragement), 1600);
        }

        if (result.state === 'done' && msgCount > 2) {
          setTimeout(showCompletionBanner, 2200);
        } else {
          saveSession(); // auto-save after each exchange
        }
      }, delay);
    };

    // ── UTILS ──────────────────────────────────────────────
    function scrollBottom() {
      const msgs = document.getElementById('chatMsgs');
      setTimeout(() => msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' }), 60);
    }
    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !chatStarted && hasChat) window.startChat();
    });

    // Quick hint buttons — contextual help, NO conversation reset
    window.handleQuickHint = function(type) {
      if (!chatStarted) return;
      const result = ChatEngine.processQuickButton(type);
      if (!result) return;

      // Show what the user "said" (the hint phrase)
      sessionMessages.push({ role: 'user', text: result.userHint.text });
      addUserMessage(result.userHint.text);

      // Show the translation as a small note
      const msgs = document.getElementById('chatMsgs');
      const noteEl = document.createElement('div');
      noteEl.innerHTML = `<div style="text-align:right;font-size:.75rem;color:var(--t3);padding:0 .35rem;margin-top:-.4rem">🇬🇧 ${esc(result.userHint.translation)}</div>`;
      msgs.appendChild(noteEl);

      // Bot responds with encouragement + hint (with typing delay)
      sessionMessages.push({ role: 'ai', text: result.botResponse.text, translation: result.botResponse.translation });
      addAIMessage(result.botResponse.text, result.botResponse.translation, true);
      saveSession();
    };

    // Voice feature
    window.startVoice = function() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice recognition is not supported in this browser. Try Chrome.');
        return;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SR();
      recognition.lang = lang === 'spanish' ? 'es-ES' : 'cs-CZ';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      const btn = document.getElementById('voiceBtn');
      btn.textContent = '🔴 Listening...';
      btn.classList.add('listening');
      btn.disabled = true;

      recognition.onresult = function(e) {
        const spoken = e.results[0][0].transcript;
        document.getElementById('chatInput').value = spoken;
        document.getElementById('chatInput').focus();
        btn.textContent = '🎤 Try speaking';
        btn.classList.remove('listening');
        btn.disabled = false;
      };
      recognition.onerror = function() {
        btn.textContent = '🎤 Try speaking';
        btn.classList.remove('listening');
        btn.disabled = false;
      };
      recognition.onend = function() {
        if (btn.textContent === '🔴 Listening...') {
          btn.textContent = '🎤 Try speaking';
          btn.classList.remove('listening');
          btn.disabled = false;
        }
      };
      recognition.start();
    };
  })();
  </script>

</body>
</html>
